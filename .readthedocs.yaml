# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "mambaforge-23.11"
  apt_packages:
    - libnss3
    - libnspr4
    - libatk1.0-0t64
    - libatk-bridge2.0-0t64
    - libcups2t64
    - libdrm2
    - libxkbcommon0
    - libatspi2.0-0t64
    - libxcomposite1
    - libxdamage1
    - libxrandr2
    - libgbm1
    - libasound2t64
  jobs:
    pre_build:
      - pip install playwright
      - python -m playwright install chromium
      # Generate Python example files, run them, save HTML reports, and create RST docs
      - python bencher/example/meta/generate_examples.py

# Build documentation in the "docs/" directory with Sphinx
conda:
  environment: docs/conda-environment.yml  # Reference the Conda environment file

sphinx:
   configuration: docs/conf.py

# Disable additional formats (htmlzip is built by default and adds overhead)
formats: []
