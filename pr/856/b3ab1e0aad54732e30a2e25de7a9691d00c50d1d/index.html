<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Report</title>
<style>
body { margin:0; font-family:sans-serif; }
.tab-bar { display:flex; gap:4px; background:rgba(0,0,0,0.9); padding:10px; position:sticky; top:0; z-index:100; }
.tab-btn { padding:10px 16px; border:none; cursor:pointer; background:rgba(255,255,255,0.15); color:#fff; font-size:14px; border-radius:4px; }
.tab-btn.active { background:rgba(255,255,255,0.9); color:#000; font-weight:bold; }
iframe { width:100%; border:none; }
</style></head><body>
<div class="tab-bar"><button class="tab-btn" onclick="switchTab(this, '_tabs/Time_by_File.html')">Time by File</button>
<button class="tab-btn" onclick="switchTab(this, '_tabs/Slowest_Tests.html')">Slowest Tests</button>
<button class="tab-btn active" onclick="switchTab(this, '_tabs/Summary.html')">Summary</button>
</div>
<iframe id="content" src="_tabs/Summary.html"></iframe>
<script>
function switchTab(btn, src) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('content').src = src;
}
function resizeIframe() {
  var f = document.getElementById('content');
  f.style.height = (window.innerHeight - f.getBoundingClientRect().top) + 'px';
}
window.addEventListener('resize', resizeIframe);
document.getElementById('content').addEventListener('load', resizeIframe);
resizeIframe();
</script></body></html>
